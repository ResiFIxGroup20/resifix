{% extends 'base.html' %}
{% block title %}Reset Password — ResiFix{% endblock %}

{% block auth_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center;
            background:var(--bg); padding:24px;">
  <div style="width:100%; max-width:420px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-size:40px; margin-bottom:8px;">🔧</div>
      <div style="font-size:24px; font-weight:800; letter-spacing:-0.03em;">ResiFix</div>
      <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">DUT Hostel Maintenance</div>
    </div>

    <div style="background:var(--bg-2); border:1px solid var(--border-strong);
                border-radius:var(--radius); padding:32px;">

      <!-- Header -->
      <div style="text-align:center; margin-bottom:28px;">
        <div style="width:56px; height:56px; border-radius:50%; margin:0 auto 14px;
                    background:linear-gradient(135deg,var(--accent),#7c3aed);
                    display:flex; align-items:center; justify-content:center; font-size:24px;">
          🔑
        </div>
        <h2 style="font-size:20px; font-weight:700; margin-bottom:6px;">Set a new password</h2>
        <p style="font-size:13px; color:var(--text-muted);">
          Choose a strong password of at least 8 characters.
        </p>
      </div>

      <form method="POST">

        <div class="form-group-custom">
          <label class="form-label-custom">New Password</label>
          <div class="input-icon-wrap" style="position:relative;">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" name="password" id="pwd1" class="form-control-custom"
                   placeholder="Minimum 8 characters"
                   required minlength="8" autofocus
                   style="padding-right:40px;">
            <button type="button" onclick="toggleVis('pwd1','eyeIcon1')"
                    style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                           background:none; border:none; color:var(--text-muted); cursor:pointer;
                           font-size:16px; padding:0;">
              <i class="bi bi-eye-fill" id="eyeIcon1"></i>
            </button>
          </div>

          <!-- Strength bar -->
          <div style="margin-top:8px;">
            <div style="height:4px; background:var(--bg-3); border-radius:2px; overflow:hidden;">
              <div id="strengthBar"
                   style="height:100%; width:0%; border-radius:2px; transition:width 0.3s, background 0.3s;">
              </div>
            </div>
            <div id="strengthLabel"
                 style="font-size:11px; color:var(--text-faint); margin-top:4px;"></div>
          </div>
        </div>

        <div class="form-group-custom">
          <label class="form-label-custom">Confirm New Password</label>
          <div class="input-icon-wrap" style="position:relative;">
            <i class="bi bi-lock-fill input-icon"></i>
            <input type="password" name="confirm_password" id="pwd2"
                   class="form-control-custom"
                   placeholder="Repeat your new password"
                   required minlength="8"
                   style="padding-right:40px;">
            <button type="button" onclick="toggleVis('pwd2','eyeIcon2')"
                    style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                           background:none; border:none; color:var(--text-muted); cursor:pointer;
                           font-size:16px; padding:0;">
              <i class="bi bi-eye-fill" id="eyeIcon2"></i>
            </button>
          </div>
          <div id="matchHint" style="font-size:11px; margin-top:4px;"></div>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary w-100"
                style="margin-top:8px; padding:12px;">
          <i class="bi bi-check-circle-fill"></i> Reset Password
        </button>

      </form>

      <div style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-muted);">
        <a href="{{ url_for('auth.login') }}"
           style="color:var(--accent); font-weight:600; text-decoration:none;">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ── Show/hide password ────────────────────────────────────────────────────
function toggleVis(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type   = 'text';
        icon.className = 'bi bi-eye-slash-fill';
    } else {
        input.type   = 'password';
        icon.className = 'bi bi-eye-fill';
    }
}

// ── Strength meter ────────────────────────────────────────────────────────
const pwd1       = document.getElementById('pwd1');
const pwd2       = document.getElementById('pwd2');
const bar        = document.getElementById('strengthBar');
const label      = document.getElementById('strengthLabel');
const matchHint  = document.getElementById('matchHint');
const submitBtn  = document.getElementById('submitBtn');

const levels = [
    { min: 0,  color: '#ef4444', text: 'Too short'  },
    { min: 8,  color: '#f59e0b', text: 'Weak'       },
    { min: 10, color: '#3b82f6', text: 'Fair'       },
    { min: 12, color: '#22c55e', text: 'Strong'     },
];

function calcStrength(p) {
    let score = 0;
    if (p.length >= 8)  score++;
    if (p.length >= 12) score++;
    if (/[A-Z]/.test(p))           score++;
    if (/[0-9]/.test(p))           score++;
    if (/[^A-Za-z0-9]/.test(p))   score++;
    return score; // 0-5
}

pwd1.addEventListener('input', () => {
    const p     = pwd1.value;
    const score = calcStrength(p);
    const pct   = Math.min(score / 5 * 100, 100);
    const lvl   = p.length < 8 ? levels[0]
                : score <= 2   ? levels[1]
                : score <= 3   ? levels[2]
                :                levels[3];
    bar.style.width      = pct + '%';
    bar.style.background = lvl.color;
    label.style.color    = lvl.color;
    label.textContent    = p.length ? lvl.text : '';
    checkMatch();
});

pwd2.addEventListener('input', checkMatch);

function checkMatch() {
    const v1 = pwd1.value, v2 = pwd2.value;
    if (!v2) { matchHint.textContent = ''; return; }
    if (v1 === v2) {
        matchHint.style.color = 'var(--success)';
        matchHint.textContent = '✓ Passwords match';
    } else {
        matchHint.style.color = 'var(--danger)';
        matchHint.textContent = '✗ Passwords do not match';
    }
}
</script>
{% endblock %}
